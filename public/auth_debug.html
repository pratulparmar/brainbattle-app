<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BrainBattle Auth Debug</title>
  <style>
    body { font-family: monospace; padding: 16px; background: #0a0a0a; color: #00ff00; font-size: 13px; }
    .log { margin: 4px 0; padding: 4px 8px; border-radius: 4px; word-break: break-all; }
    .info  { background: #001a00; color: #00ff00; }
    .warn  { background: #1a1a00; color: #ffff00; }
    .error { background: #1a0000; color: #ff4444; }
    .success { background: #001a00; color: #00ff88; font-weight: bold; }
    button { margin: 8px 4px; padding: 12px 20px; border-radius: 8px; border: none; 
             background: #4285f4; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
    #status { font-size: 16px; font-weight: bold; padding: 12px; border-radius: 8px; 
              margin-bottom: 12px; background: #111; }
  </style>
</head>
<body>
  <div id="status">🔍 Initializing...</div>
  <div id="logs"></div>
  <button onclick="testLogin()">Test Google Login</button>
  <button onclick="testPersistence()">Test Persistence</button>
  <button onclick="clearAndReload()">Clear & Reload</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, GoogleAuthProvider, signInWithRedirect, 
      getRedirectResult, onAuthStateChanged, setPersistence,
      browserLocalPersistence, browserSessionPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const config = {
      apiKey: "AIzaSyC4awLUkV8Z1PqFCW0FLVlpXhyoGud4dwg",
      authDomain: "brainbattle-neet.firebaseapp.com",
      projectId: "brainbattle-neet",
      appId: "1:655830697038:web:61918bd3a81942a6bb6f1f"
    };

    const logs = document.getElementById("logs");
    const status = document.getElementById("status");

    function log(msg, type="info") {
      const div = document.createElement("div");
      div.className = `log ${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logs.prepend(div);
      console.log(msg);
    }

    function setStatus(msg, ok) {
      status.textContent = msg;
      status.style.background = ok ? "#003300" : ok===false ? "#330000" : "#111";
    }

    const app  = initializeApp(config);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    log("Firebase initialized");
    log(`User agent: ${navigator.userAgent.slice(0,80)}`);
    log(`Is mobile: ${/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent)}`);
    log(`Protocol: ${location.protocol}`);
    log(`Host: ${location.host}`);

    // Step 1: Test persistence
    try {
      await setPersistence(auth, browserLocalPersistence);
      log("✅ browserLocalPersistence set OK", "success");
    } catch(e) {
      log(`❌ browserLocalPersistence FAILED: ${e.message}`, "error");
      try {
        await setPersistence(auth, browserSessionPersistence);
        log("⚠️ Fell back to browserSessionPersistence", "warn");
      } catch(e2) {
        log(`❌ browserSessionPersistence also FAILED: ${e2.message}`, "error");
      }
    }

    // Step 2: Check for redirect result
    log("Checking getRedirectResult...");
    try {
      const result = await getRedirectResult(auth);
      if (result) {
        log(`✅ Redirect result found! User: ${result.user.email}`, "success");
        setStatus(`✅ Logged in as ${result.user.email}`, true);
      } else {
        log("No redirect result (first load or not a redirect)", "info");
      }
    } catch(e) {
      log(`❌ getRedirectResult ERROR: ${e.code} - ${e.message}`, "error");
      setStatus(`❌ Redirect Error: ${e.code}`, false);
    }

    // Step 3: Auth state listener
    log("Setting up onAuthStateChanged...");
    onAuthStateChanged(auth, (user) => {
      if (user) {
        log(`✅ onAuthStateChanged: user = ${user.email}`, "success");
        setStatus(`✅ Auth state: logged in as ${user.email}`, true);
      } else {
        log("onAuthStateChanged: user = null (not logged in)", "warn");
        setStatus("⚠️ Auth state: not logged in", null);
      }
    });

    // Test functions
    window.testLogin = async () => {
      log("Starting signInWithRedirect...");
      try {
        await signInWithRedirect(auth, provider);
        log("Redirect initiated...", "info");
      } catch(e) {
        log(`❌ signInWithRedirect FAILED: ${e.code} - ${e.message}`, "error");
        setStatus(`❌ ${e.code}`, false);
      }
    };

    window.testPersistence = async () => {
      log("Current auth persistence type: checking localStorage...");
      const keys = Object.keys(localStorage).filter(k => k.includes("firebase"));
      log(`Firebase localStorage keys: ${keys.length > 0 ? keys.join(", ") : "NONE"}`);
      keys.forEach(k => log(`  ${k}: ${localStorage.getItem(k)?.slice(0,50)}`));
    };

    window.clearAndReload = () => {
      Object.keys(localStorage).filter(k => k.includes("firebase")).forEach(k => localStorage.removeItem(k));
      log("Cleared Firebase localStorage. Reloading...", "warn");
      setTimeout(() => location.reload(), 500);
    };

    log("Debug page ready. Tap 'Test Google Login' to start.");
    setStatus("🔍 Ready — tap Test Google Login", null);
  </script>
</body>
</html>
